<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="30%" stop-color="#c0c0c0"/>
      <stop offset="60%" stop-color="#a0a0a0"/>
      <stop offset="100%" stop-color="#808080"/>
    </linearGradient>
    <linearGradient id="metalDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#909090"/>
      <stop offset="50%" stop-color="#606060"/>
      <stop offset="100%" stop-color="#404040"/>
    </linearGradient>
    <linearGradient id="visorGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#330000"/>
      <stop offset="15%" stop-color="#660000"/>
      <stop offset="50%" stop-color="#ff0000"/>
      <stop offset="85%" stop-color="#660000"/>
      <stop offset="100%" stop-color="#330000"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ff0000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="neckGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#505050"/>
      <stop offset="50%" stop-color="#707070"/>
      <stop offset="100%" stop-color="#404040"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)"/>

  <!-- Neck -->
  <rect x="370" y="700" width="284" height="120" rx="20" fill="url(#neckGrad)" stroke="#555" stroke-width="4"/>
  <!-- Neck ridges -->
  <line x1="400" y1="720" x2="400" y2="800" stroke="#555" stroke-width="3"/>
  <line x1="430" y1="720" x2="430" y2="800" stroke="#555" stroke-width="3"/>
  <line x1="460" y1="720" x2="460" y2="800" stroke="#555" stroke-width="3"/>
  <line x1="490" y1="720" x2="490" y2="800" stroke="#555" stroke-width="3"/>
  <line x1="520" y1="720" x2="520" y2="800" stroke="#555" stroke-width="3"/>
  <line x1="550" y1="720" x2="550" y2="800" stroke="#555" stroke-width="3"/>
  <line x1="580" y1="720" x2="580" y2="800" stroke="#555" stroke-width="3"/>
  <line x1="610" y1="720" x2="610" y2="800" stroke="#555" stroke-width="3"/>

  <!-- Shoulder armor -->
  <ellipse cx="280" cy="740" rx="100" ry="60" fill="url(#metalDark)" stroke="#666" stroke-width="4" transform="rotate(-15, 280, 740)"/>
  <ellipse cx="744" cy="740" rx="100" ry="60" fill="url(#metalDark)" stroke="#666" stroke-width="4" transform="rotate(15, 744, 740)"/>

  <!-- Head main shape - 3/4 view (slightly turned to the right) -->
  <path d="M320,240 
           C320,200 360,160 420,150 
           C480,140 580,140 640,160
           C700,180 740,220 740,280
           C740,340 730,400 710,450
           C690,500 660,540 620,570
           C580,600 530,620 480,620
           C430,620 380,600 350,570
           C320,540 300,500 290,450
           C280,400 280,340 290,300
           Z" 
        fill="url(#metalGrad)" stroke="#888" stroke-width="4"/>

  <!-- Right side darker (3/4 turn shading) -->
  <path d="M580,160 
           C640,160 700,180 740,280
           C780,380 740,500 620,570
           C580,540 560,500 550,450
           C580,400 600,340 600,280
           C600,240 590,200 580,160 Z" 
        fill="url(#metalDark)" opacity="0.5"/>

  <!-- Forehead ridge -->
  <rect x="340" y="220" width="340" height="30" rx="15" fill="url(#metalDark)" stroke="#777" stroke-width="3"/>

  <!-- Left ear piece -->
  <ellipse cx="290" cy="400" rx="35" ry="70" fill="url(#metalGrad)" stroke="#777" stroke-width="4"/>
  <ellipse cx="290" cy="400" rx="15" ry="40" fill="#333" stroke="#555" stroke-width="2"/>

  <!-- Right ear piece (further away in 3/4) -->
  <ellipse cx="745" cy="380" rx="25" ry="55" fill="url(#metalDark)" stroke="#555" stroke-width="3"/>
  <ellipse cx="745" cy="380" rx="10" ry="30" fill="#333" stroke="#444" stroke-width="2"/>

  <!-- Visor/eye socket area -->
  <path d="M340,300 
           L700,290
           L680,380
           L320,380
           Z" 
        fill="#1a0000" stroke="#555" stroke-width="3"/>

  <!-- Red scanner bar (the iconic Cylon eye) -->
  <rect x="330" y="355" width="360" height="14" rx="7" fill="url(#visorGrad)">
    <animate attributeName="x" values="330;345;330" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Red glow effect -->
  <ellipse cx="510" cy="362" rx="100" ry="25" fill="url(#glowGrad)">
    <animate attributeName="cx" values="490;530;490" dur="2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Mouth/vent area -->
  <rect x="380" y="460" width="260" height="8" rx="4" fill="#333" stroke="#555" stroke-width="2"/>
  <rect x="380" y="480" width="260" height="8" rx="4" fill="#333" stroke="#555" stroke-width="2"/>
  <rect x="380" y="500" width="240" height="8" rx="4" fill="#333" stroke="#555" stroke-width="2"/>

  <!-- Chin -->
  <path d="M400,540 L624,540 C630,570 620,590 600,600 L440,600 C420,590 400,570 400,540 Z" 
        fill="url(#metalDark)" stroke="#666" stroke-width="3"/>

  <!-- Highlight/shine on forehead -->
  <ellipse cx="460" cy="210" rx="80" ry="12" fill="white" opacity="0.15"/>
</svg>
